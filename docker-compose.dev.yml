# ══════════════════════════════════════════════════════════════
# WORLD AI — Override Développement Local
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ══════════════════════════════════════════════════════════════
# Différences vs production :
#   - Traefik sans SSL (HTTP uniquement)
#   - Tous les ports internes exposés sur localhost
#   - Log levels en DEBUG
#   - Hot-reload activé là où possible
# ══════════════════════════════════════════════════════════════

services:

  # Traefik sans SSL en dev
  traefik:
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=worldai-public"
      - "--entrypoints.web.address=:80"
      - "--ping=true"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "8080:8080"

  # Ports DB exposés pour tooling local (DBeaver, etc.)
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${WORLDAI_POSTGRES_USER:-worldai}
      POSTGRES_PASSWORD: ${WORLDAI_POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${WORLDAI_POSTGRES_DB:-worldai}

  redis:
    ports:
      - "6379:6379"

  # Ports graph/vector exposés pour inspection locale
  memgraph:
    ports:
      - "7687:7687"
      - "7444:7444"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  # n8n en HTTP local
  n8n:
    environment:
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_ENCRYPTION_KEY: ${WORLDAI_N8N_ENCRYPTION_KEY:-dev-encryption-key-32chars-min}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${WORLDAI_POSTGRES_USER:-worldai}
      DB_POSTGRESDB_PASSWORD: ${WORLDAI_POSTGRES_PASSWORD:-devpassword}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD:-devpassword}
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Europe/Paris
      N8N_LOG_LEVEL: debug
    ports:
      - "5678:5678"

  # Langfuse en HTTP local
  langfuse:
    environment:
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD:-devpassword}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${WORLDAI_LANGFUSE_NEXTAUTH_SECRET:-dev-nextauth-secret}
      SALT: ${WORLDAI_LANGFUSE_SALT:-dev-salt}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"

  # Dify API en HTTP local
  dify-api:
    environment:
      MODE: api
      SECRET_KEY: ${WORLDAI_DIFY_SECRET_KEY:-dev-secret-key}
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD:-devpassword}@postgres:5432/dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD:-devpassword}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${WORLDAI_REDIS_PASSWORD:-devpassword}@redis:6379/1
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${WORLDAI_QDRANT_API_KEY:-}
      LOG_LEVEL: DEBUG
      MIGRATION_ENABLED: "true"
    ports:
      - "5001:5001"

  dify-worker:
    environment:
      MODE: worker
      SECRET_KEY: ${WORLDAI_DIFY_SECRET_KEY:-dev-secret-key}
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD:-devpassword}@postgres:5432/dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD:-devpassword}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${WORLDAI_REDIS_PASSWORD:-devpassword}@redis:6379/1
      LOG_LEVEL: DEBUG

  # Dify Web en HTTP local
  dify-web:
    environment:
      EDITION: SELF_HOSTED
      CONSOLE_API_URL: http://localhost:5001
      APP_API_URL: http://localhost:5001
    ports:
      - "3000:3000"

  # Gateway en hot-reload (uvicorn --reload)
  gateway:
    build:
      context: .
      dockerfile: interfaces/Dockerfile
    command:
      - "uvicorn"
      - "interfaces.gateway.gateway:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8100"
      - "--reload"
      - "--log-level"
      - "debug"
    environment:
      WORLDAI_ENV: development
      WORLDAI_TELEGRAM_BOT_TOKEN: ${WORLDAI_TELEGRAM_BOT_TOKEN:-}
      WORLDAI_DISCORD_BOT_TOKEN: ${WORLDAI_DISCORD_BOT_TOKEN:-}
      WORLDAI_SLACK_BOT_TOKEN: ${WORLDAI_SLACK_BOT_TOKEN:-}
      WORLDAI_WEBCHAT_SECRET: ${WORLDAI_WEBCHAT_SECRET:-dev-webchat-secret}
      WORLDAI_API_PUBLIC_KEY: ${WORLDAI_API_PUBLIC_KEY:-dev-api-key}
      WORLDAI_REDIS_URL: redis://:${WORLDAI_REDIS_PASSWORD:-devpassword}@redis:6379/2
      WORLDAI_OPENROUTER_API_KEY: ${WORLDAI_OPENROUTER_API_KEY:-}
      WORLDAI_CONFIDENCE_THRESHOLD: "0.75"
    volumes:
      # Hot-reload : monte le code source
      - ./interfaces:/app/interfaces
      - ./core:/app/core
      - ./config:/app/config
    ports:
      - "8100:8100"

# En dev le réseau internal n'est pas isolé pour faciliter le debug
networks:
  worldai-internal:
    internal: false
