# ══════════════════════════════════════════════════════════════
# WORLD AI — Stack Complète
# Démarrage : docker compose up -d
# Prérequis  : fichier .env rempli (cp .env.example .env)
# ══════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────
  # TRAEFIK — Reverse Proxy + SSL automatique Let's Encrypt
  # Dashboard : https://traefik.<WORLDAI_DOMAIN>
  # ────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: worldai-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=worldai-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${WORLDAI_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--log.level=INFO"
      - "--ping=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - worldai-public
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${WORLDAI_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  # ────────────────────────────────────────────────────────────
  # REDIS — Cache, Sessions, Queues Celery
  # Réseau interne uniquement
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: worldai-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${WORLDAI_REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - worldai-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${WORLDAI_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────
  # POSTGRESQL — Base partagée (n8n + Langfuse + Dify)
  # Init : config/postgres/init.sql créé les 3 databases
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: worldai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${WORLDAI_POSTGRES_USER:-worldai}
      POSTGRES_PASSWORD: ${WORLDAI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${WORLDAI_POSTGRES_DB:-worldai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - worldai-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WORLDAI_POSTGRES_USER:-worldai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────
  # MEMGRAPH — Knowledge Graph (Couche 1 — Âme Numérique)
  # Bolt : bolt://memgraph:7687 (interne)
  # ────────────────────────────────────────────────────────────
  memgraph:
    image: memgraph/memgraph:2.16.0
    container_name: worldai-memgraph
    restart: unless-stopped
    entrypoint:
      - "/usr/lib/memgraph/memgraph"
      - "--bolt-port=7687"
      - "--log-level=WARNING"
      - "--memory-limit=2048"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-logs:/var/log/memgraph
    networks:
      - worldai-internal
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host localhost --port 7687 2>&1 | grep -q '1 row' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────────────────────────
  # QDRANT — Base Vectorielle (Couche 1 — Mémoire Sémantique)
  # REST : http://qdrant:6333 (interne)
  # ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: worldai-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${WORLDAI_QDRANT_API_KEY}
      QDRANT__SERVICE__GRPC_PORT: "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - worldai-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────
  # N8N — Orchestration Workflows (Couche 5 / interface n8n)
  # UI : https://n8n.<WORLDAI_DOMAIN>
  # ────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.50.0
    container_name: worldai-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: n8n.${WORLDAI_DOMAIN}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_ENCRYPTION_KEY: ${WORLDAI_N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${WORLDAI_POSTGRES_USER:-worldai}
      DB_POSTGRESDB_PASSWORD: ${WORLDAI_POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD}
      WEBHOOK_URL: https://n8n.${WORLDAI_DOMAIN}
      GENERIC_TIMEZONE: Europe/Paris
      N8N_LOG_LEVEL: info
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/exports:/home/node/.n8n/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worldai-internal
      - worldai-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${WORLDAI_DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  # ────────────────────────────────────────────────────────────
  # LANGFUSE — Observabilité LLM (Couche 2 — Tracing)
  # UI : https://langfuse.<WORLDAI_DOMAIN>
  # ────────────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: worldai-langfuse
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: https://langfuse.${WORLDAI_DOMAIN}
      NEXTAUTH_SECRET: ${WORLDAI_LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${WORLDAI_LANGFUSE_SALT}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_DEFAULT_PROJECT_ID: worldai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - worldai-internal
      - worldai-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.${WORLDAI_DOMAIN}`)"
      - "traefik.http.routers.langfuse.entrypoints=websecure"
      - "traefik.http.routers.langfuse.tls.certresolver=letsencrypt"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"

  # ────────────────────────────────────────────────────────────
  # DIFY API — Backend IA (Couche 5 — Interface Web)
  # ────────────────────────────────────────────────────────────
  dify-api:
    image: langgenius/dify-api:${WORLDAI_DIFY_VERSION:-0.6.14}
    container_name: worldai-dify-api
    restart: unless-stopped
    environment:
      MODE: api
      SECRET_KEY: ${WORLDAI_DIFY_SECRET_KEY}
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD}@postgres:5432/dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${WORLDAI_REDIS_PASSWORD}@redis:6379/1
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${WORLDAI_QDRANT_API_KEY}
      LOG_LEVEL: INFO
      MIGRATION_ENABLED: "true"
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worldai-internal
      - worldai-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify-api.rule=Host(`dify.${WORLDAI_DOMAIN}`) && (PathPrefix(`/console/api`) || PathPrefix(`/api`) || PathPrefix(`/v1`) || PathPrefix(`/files`))"
      - "traefik.http.routers.dify-api.entrypoints=websecure"
      - "traefik.http.routers.dify-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dify-api.loadbalancer.server.port=5001"

  # ────────────────────────────────────────────────────────────
  # DIFY WORKER — Tâches asynchrones Celery
  # ────────────────────────────────────────────────────────────
  dify-worker:
    image: langgenius/dify-api:${WORLDAI_DIFY_VERSION:-0.6.14}
    container_name: worldai-dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: ${WORLDAI_DIFY_SECRET_KEY}
      DATABASE_URL: postgresql://${WORLDAI_POSTGRES_USER:-worldai}:${WORLDAI_POSTGRES_PASSWORD}@postgres:5432/dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${WORLDAI_REDIS_PASSWORD}
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://:${WORLDAI_REDIS_PASSWORD}@redis:6379/1
      LOG_LEVEL: INFO
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dify-api:
        condition: service_healthy
    networks:
      - worldai-internal
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ────────────────────────────────────────────────────────────
  # DIFY WEB — Frontend Next.js
  # UI : https://dify.<WORLDAI_DOMAIN>
  # ────────────────────────────────────────────────────────────
  dify-web:
    image: langgenius/dify-web:${WORLDAI_DIFY_VERSION:-0.6.14}
    container_name: worldai-dify-web
    restart: unless-stopped
    environment:
      EDITION: SELF_HOSTED
      CONSOLE_API_URL: https://dify.${WORLDAI_DOMAIN}
      APP_API_URL: https://dify.${WORLDAI_DOMAIN}
    depends_on:
      dify-api:
        condition: service_healthy
    networks:
      - worldai-internal
      - worldai-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dify-web.rule=Host(`dify.${WORLDAI_DOMAIN}`)"
      - "traefik.http.routers.dify-web.entrypoints=websecure"
      - "traefik.http.routers.dify-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.dify-web.loadbalancer.server.port=3000"

# ══════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════
networks:
  worldai-public:
    name: worldai-public
    driver: bridge
  worldai-internal:
    name: worldai-internal
    driver: bridge
    internal: true

# ══════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════
volumes:
  traefik-certs:
    name: worldai-traefik-certs
  redis-data:
    name: worldai-redis-data
  postgres-data:
    name: worldai-postgres-data
  memgraph-data:
    name: worldai-memgraph-data
  memgraph-logs:
    name: worldai-memgraph-logs
  qdrant-data:
    name: worldai-qdrant-data
  n8n-data:
    name: worldai-n8n-data
  dify-storage:
    name: worldai-dify-storage
